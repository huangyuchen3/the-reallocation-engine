<title id="fig-title-01">The three-tier trust stack</title>
<desc>A three-tier vertical stack built upward. A wide foundation tier (numbers trace to real records) supports a middle working tier (are the right things measured), which leads up to the top tier (trustworthy inference). Solid arrows run up through the tiers to the trust box; an ascent arrow on the left marks the build. A danger-zone callout at the bottom names where coverage gaps, name-matching failures, and base-rate mismatch live.</desc>
